<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRIDE RolePlay</title>
    <!-- ИКОНКА ДЛЯ ВКЛАДКИ (FAVICON) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23111%22/><text x=%2250%25%22 y=%2250%25%22 font-family=%22Montserrat, sans-serif%22 font-size=%2270%22 font-weight=%22900%22 fill=%22%23ff6600%22 dominant-baseline=%22central%22 text-anchor=%22middle%22>F</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff6600;
            --background-color: #111111;
            --text-color: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.05);
        }
        html { scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; background-color: var(--background-color); color: var(--text-color); overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        header { position: fixed; width: 100%; box-sizing: border-box; top: 0; left: 0; display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: rgba(0, 0, 0, 0.5); z-index: 1000; transition: background 0.3s ease; }
        .logo { font-size: 2em; font-weight: 900; text-transform: uppercase; flex-shrink: 0; }
        
        nav { position: absolute; left: 50%; transform: translateX(-50%); }
        nav button, .play-button, .download-button, .modal-buttons button { transition: background-color 0.3s, color 0.3s, transform 0.3s, box-shadow 0.3s; }
        nav button:hover, .play-button:hover, .download-button:hover, .modal-buttons button:not(.back-button):hover:not(:disabled) {
            box-shadow: 0 0 5px var(--primary-color), 0 0 15px var(--primary-color), 0 0 25px var(--primary-color);
            color: #fff;
        }
        .modal-buttons .back-button:hover { box-shadow: 0 0 5px #888, 0 0 10px #888; }
        nav button { background-color: transparent; color: var(--text-color); border: 2px solid var(--primary-color); padding: 10px 20px; margin: 0 5px; cursor: pointer; font-size: 1em; font-weight: 700; border-radius: 5px; }
        
        /* --- СТИЛИ ДЛЯ БУРГЕР-МЕНЮ --- */
        #menu-toggle, #menu-close { display: none; }
        
        .main-banner { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; height: 100vh; background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('generated_image_9eafcaba-d227-4f51-8c50-8f200777cfc3.png'); background-size: cover; background-position: center; color: var(--text-color); padding: 0 20px; }
        .main-banner h1 { font-size: 5em; font-weight: 900; margin: 0; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .main-banner p { font-size: 1.5em; margin-bottom: 40px; max-width: 800px; line-height: 1.4; }
        .play-button { background-color: var(--primary-color); color: var(--text-color); padding: 15px 40px; text-decoration: none; font-size: 1.5em; font-weight: 700; border-radius: 50px; }
        
        .content-section { padding: 100px 0; opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease-out, transform 0.8s ease-out; }
        .content-section.visible { opacity: 1; transform: translateY(0); }
        .content-section h2 { text-align: center; font-size: 2.8em; font-weight: 900; margin-bottom: 60px; color: var(--primary-color); text-transform: uppercase; }
        
        .news-container, .server-list, #how-to-play .steps-container { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .news-item, .server-item, .step-item { background: var(--card-bg); border-radius: 15px; transition: transform 0.3s, box-shadow 0.3s; }
        .news-item:hover, .server-item:hover, .step-item:hover { transform: translateY(-10px); box-shadow: 0 8px 25px rgba(255, 102, 0, 0.2); }
        .news-item { padding: 20px; width: 300px; }
        
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .modal-content { background-color: #1a1a1a; margin: 5% auto; padding: 30px; border: 1px solid var(--primary-color); width: 90%; max-width: 500px; border-radius: 10px; text-align: center; color: white; animation: modal-fade-in 0.5s; position: relative; }
        @keyframes modal-fade-in { from {transform: scale(0.9); opacity: 0;} to {transform: scale(1); opacity: 1;} }
        
        .modal-content h2 { color: var(--primary-color); margin-top: 0; }
        .modal-content input, .modal-content select, .modal-content textarea { width: calc(100% - 40px); padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #555; background-color: #333; color: white; font-size: 1em; font-family: 'Montserrat', sans-serif; }
        
        .modal-buttons { margin-top: 20px; }
        .modal-buttons button { background-color: var(--primary-color); color: white; border: none; padding: 12px 24px; margin: 10px 5px; cursor: pointer; font-size: 1em; border-radius: 5px; }
        .modal-buttons .back-button { background-color: #555; }
        .modal-buttons button:disabled { opacity: 0.6; cursor: not-allowed; }
        
        /* --- Стили для Анимации Галочки --- */
        #success-message { display: none; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.5s; }
        .success-checkmark { width: 80px; height: 80px; border-radius: 50%; display: block; stroke-width: 2; stroke: #4bb71b; stroke-miterlimit: 10; margin: 0 auto 20px; box-shadow: inset 0px 0px 0px #4bb71b; animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both; }
        .success-checkmark__circle { stroke-dasharray: 166; stroke-dashoffset: 166; stroke-width: 2; stroke-miterlimit: 10; stroke: #4bb71b; fill: none; animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards; }
        .success-checkmark__check { transform-origin: 50% 50%; stroke-dasharray: 48; stroke-dashoffset: 48; animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards; }
        @keyframes stroke { 100% { stroke-dashoffset: 0; } }
        @keyframes scale { 0%, 100% { transform: none; } 50% { transform: scale3d(1.1, 1.1, 1); } }
        @keyframes fill { 100% { box-shadow: inset 0px 0px 0px 30px #4bb71b; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Стили для сообщения об ошибке --- */
        .error-message { color: #ff4d4d; font-weight: bold; margin-top: 15px; display: none; }

        /* ... (остальные стили остаются без изменений) ... */
    </style>
</head>
<body>

    <!-- ================== HTML-СТРУКТУРА ================== -->
    <header>
        <!-- ... (код шапки без изменений) ... -->
    </header>

    <main class="main-banner">
        <!-- ... (код баннера без изменений) ... -->
    </main>

    <!-- ... (код секций news, servers, how-to-play, socials, footer без изменений) ... -->
    
    <!-- ================== МОДАЛЬНЫЕ ОКНА ================== -->

    <!-- Модальное окно "ЗАЯВКИ" (без изменений) -->
    <!-- ... -->
    
    <!-- Модальное окно Forbes (без изменений) -->
    <!-- ... -->

    <!-- Модальное окно Профиля Игрока -->
    <div id="playerProfileModal" class="modal">
        <div class="modal-content">
             <div class="player-profile-content">
                <img id="playerSkin" src="" alt="Скин игрока" class="player-skin">
                <div class="player-info">
                    <h2 id="playerName"></h2>
                    <ul class="player-stats">
                        <li>Уровень: <span id="playerLevel"></span></li>
                        <li>На руках: <span id="playerCash"></span></li>
                        <li>Имущество: <span id="playerAssets"></span></li>
                        <!-- Можно добавить любые другие поля из базы -->
                    </ul>
                </div>
            </div>
            <div class="modal-buttons">
                <button type="button" class="back-button" onclick="document.getElementById('playerProfileModal').style.display='none'">Назад</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно Логина (С СИМУЛЯЦИЕЙ) -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <div id="login-form-container">
                <h2>Личный кабинет</h2>
                <form id="login-form">
                    <input type="text" id="login-username" placeholder="Имя" required>
                    <input type="password" id="login-password" placeholder="Пароль" required>
                    <select id="login-server">
                        <option>Server 01</option>
                        <option>Server 02</option>
                        <option>Server 03</option>
                    </select>
                    <div class="error-message" id="login-error">Неверный логин или пароль!</div>
                    <div class="modal-buttons">
                        <button type="submit" id="login-submit-btn">Продолжить</button>
                        <button type="button" class="back-button" onclick="document.getElementById('loginModal').style.display='none'">Назад</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Модальное окно Доната (С СИМУЛЯЦИЕЙ) -->
    <div id="donateModal" class="modal">
        <div class="modal-content">
            <div id="donate-form-container">
                <h2>Донат</h2>
                <form id="donate-form">
                    <input type="text" id="donate-username" placeholder="Ваш игровой ник" required>
                    <input type="number" id="donate-amount" placeholder="Сумма" required min="10">
                    <div class="error-message" id="donate-error"></div>
                    <div class="modal-buttons">
                        <button type="submit" id="donate-submit-btn">Перейти к оплате</button>
                        <button type="button" class="back-button" onclick="document.getElementById('donateModal').style.display='none'">Назад</button>
                    </div>
                </form>
            </div>
            <!-- Экран успеха доната -->
            <div id="donate-success-message" style="display: none;">
                <!-- Тут можно использовать ту же анимацию галочки -->
                <h3>Платёж успешен!</h3>
                <p>Средства скоро поступят на ваш аккаунт.</p>
                <div class="modal-buttons">
                    <button type="button" onclick="document.getElementById('donateModal').style.display='none'">Закрыть</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ... (остальные модальные окна, если есть) ... -->

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ... (весь предыдущий JS-код для анимаций, скролла, меню, Forbes) ...

            // ===============================================
            // СИМУЛЯЦИЯ ЛИЧНОГО КАБИНЕТА
            // ===============================================
            const loginForm = document.getElementById('login-form');
            const loginError = document.getElementById('login-error');
            const loginSubmitBtn = document.getElementById('login-submit-btn');

            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                loginError.style.display = 'none';
                loginSubmitBtn.textContent = 'Проверка...';
                loginSubmitBtn.disabled = true;

                const username = document.getElementById('login-username').value;
                const password = document.getElementById('login-password').value;
                
                // В РЕАЛЬНОМ САЙТЕ: здесь будет AJAX-запрос к PHP-скрипту,
                // который подключится к твоей базе данных gs106226.
                // fetch('login.php', { method: 'POST', body: new FormData(this) })
                
                // СИМУЛЯЦИЯ: делаем вид, что получили ответ от сервера
                setTimeout(() => {
                    // Проверяем, совпадают ли данные с нашими "тестовыми"
                    if (username === 'test_player' && password === '123') {
                        
                        // Имитируем данные, полученные из базы
                        const playerData = {
                            name: 'test_player',
                            level: 42,
                            cash: 1337000,
                            assets: 50000000,
                            skin: 'https://via.placeholder.com/150x250.png/111/fff?text=Test+Skin'
                        };

                        // Заполняем профиль
                        document.getElementById('playerName').textContent = playerData.name;
                        document.getElementById('playerLevel').textContent = playerData.level;
                        document.getElementById('playerCash').textContent = `${playerData.cash.toLocaleString('ru-RU')} ₽`;
                        document.getElementById('playerAssets').textContent = `${playerData.assets.toLocaleString('ru-RU')} ₽`;
                        document.getElementById('playerSkin').src = playerData.skin;
                        
                        // Закрываем окно логина и открываем профиль
                        document.getElementById('loginModal').style.display = 'none';
                        document.getElementById('playerProfileModal').style.display = 'block';

                    } else {
                        // Если данные неверны - показываем ошибку
                        loginError.style.display = 'block';
                    }

                    loginSubmitBtn.textContent = 'Продолжить';
                    loginSubmitBtn.disabled = false;
                    loginForm.reset();

                }, 1000); // Задержка в 1 секунду для имитации загрузки
            });

            // ===============================================
            // СИМУЛЯЦИЯ АВТОДОНАТА
            // ===============================================
            const donateForm = document.getElementById('donate-form');
            const donateError = document.getElementById('donate-error');
            const donateSubmitBtn = document.getElementById('donate-submit-btn');
            const donateFormContainer = document.getElementById('donate-form-container');
            const donateSuccessMessage = document.getElementById('donate-success-message');

            donateForm.addEventListener('submit', function(e) {
                e.preventDefault();
                donateError.textContent = '';
                const username = document.getElementById('donate-username').value;
                const amount = document.getElementById('donate-amount').value;

                if (!username || amount < 10) {
                    donateError.textContent = 'Заполните все поля (сумма от 10р).';
                    return;
                }

                donateSubmitBtn.textContent = 'Перенаправляем...';
                donateSubmitBtn.disabled = true;

                // В РЕАЛЬНОМ САЙТЕ: здесь будет редирект на страницу оплаты
                // window.location.href = `https://frekassa.com/...?m=...&oa=${amount}&o=${username}`;
                
                // СИМУЛЯЦИЯ: делаем вид, что игрок оплатил
                setTimeout(() => {
                    // Имитируем, что FreeKassa прислала сигнал об успешной оплате
                    // и наш PHP-скрипт зачислил деньги в базу.
                    donateFormContainer.style.display = 'none';
                    donateSuccessMessage.style.display = 'block';

                    // Сбрасываем форму для следующего раза
                    donateSubmitBtn.textContent = 'Перейти к оплате';
                    donateSubmitBtn.disabled = false;
                    donateForm.reset();
                }, 2000); // Задержка в 2 секунды
            });

            // Сброс окна доната при повторном открытии
            document.querySelector('button[onclick*="donateModal"]').addEventListener('click', () => {
                donateFormContainer.style.display = 'block';
                donateSuccessMessage.style.display = 'none';
            });
        });

        // ... (остальной JS, включая функцию openApplyModal)
    </script>
</body>
</html>
